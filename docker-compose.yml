services:
  ssh-relay:
    build: ./
    image: ssh-relay:latest
    container_name: ssh-relay
    volumes:
      - ./ssh-keys:/home/sshrelay/.ssh:ro          # Mount your private key(s) here
      - ./tunnels.conf:/etc/tunnels.conf:ro         # Your tunnel definitions
    restart: unless-stopped
    # Optional resource limits for 500+ listeners
    ulimits:
      nofile: 8192