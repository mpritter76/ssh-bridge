# local_port   ssh_user          remote_host                       remote_port   extra_options
#
# ssh_user     — the OS/SSH account on the remote host that the relay authenticates
#                as to open the tunnel. Needs SSH access + AllowTcpForwarding on
#                the remote host. This is NOT the VNC login credential.
#
# remote_port  — the port on the remote host to proxy to (5900 for VNC display :0,
#                5901 for :1, 22 for SSH, etc.)
#
# VNC / application credentials are supplied by the connecting client (e.g.
# Guacamole) at session time and flow through the tunnel transparently. This
# relay never handles them.
#
# extra_options examples (do not repeat options already set by entrypoint.sh):
#   -i /home/gaterelay/.ssh/other_key   # explicit key file (required for non-standard names)
#   -o IdentitiesOnly=yes               # use only the key specified with -i, no others
#   -p 2222                              # non-standard SSH port on the remote host
#   -o ProxyJump=bastion.internal       # route through a bastion/jump host
#   -o Compression=yes                  # compress traffic (useful on slow/WAN links)
#   -o LogLevel=DEBUG                   # verbose SSH logging for troubleshooting
#
# Basic — default options only
10001          tunnel-user       vnc-server-002.internal           5900          -i /home/gaterelay/.ssh/vnc_key
# Non-standard SSH port on the remote host
10002          tunnel-user       vnc-server-002.internal           5900          -i /home/gaterelay/.ssh/vnc_key -p 2222
# Explicit key + keepalive
10003          tunnel-user       vnc-server-003.internal           5900          -i /home/gaterelay/.ssh/vnc_key -o Compression=yes
# Route through bastion host
10004          tunnel-user       vnc-server-004.internal           5900          -o ProxyJump=bastion.internal
